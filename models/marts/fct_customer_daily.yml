models:
  - name: fct_customer_daily
    description: Daily customer order fact table with one row per customer per order date.
    semantic_model:
      enabled: true
      name: customer_daily
    agg_time_dimension: order_date
    primary_entity: customer
    columns:
      - name: customer_id
        description: Customer for the daily grain.
        entity:
          type: foreign
          name: customer

      - name: order_date
        description: Order date for the daily customer grain.
        granularity: day
        dimension:
          type: time
          name: order_date

    metrics:
      - name: customer_daily_order_count
        description: Total number of customer-day orders.
        type: simple
        label: Customer Daily Order Count
        agg: sum
        expr: order_count

      - name: customer_daily_order_amount
        description: Total customer-day order amount.
        type: simple
        label: Customer Daily Order Amount
        agg: sum
        expr: order_amount

      - name: customer_daily_avg_order_amount
        description: Average order amount across customer-day rows.
        type: simple
        label: Customer Daily Avg Order Amount
        agg: average
        expr: avg_order_amount

      - name: customer_daily_orders_over_20_count
        description: Number of customer-day orders over 20.
        type: simple
        label: Customer Daily Orders Over 20 Count
        agg: sum
        expr: orders_over_20_count

      - name: customer_daily_order_amount_over_20
        description: Total customer-day order amount over 20.
        type: simple
        label: Customer Daily Order Amount Over 20
        agg: sum
        expr: order_amount_over_20

      - name: customer_daily_zero_amount_orders_count
        description: Number of customer-day orders with zero amount.
        type: simple
        label: Customer Daily Zero Amount Orders Count
        agg: sum
        expr: zero_amount_orders_count

      - name: pct_customer_daily_orders_over_20
        description: Percentage of customer-day orders over 20.
        type: ratio
        label: Percent Customer Daily Orders Over 20
        numerator: customer_daily_orders_over_20_count
        denominator: customer_daily_order_count

      - name: pct_customer_daily_zero_amount_orders
        description: Percentage of customer-day orders with zero amount.
        type: ratio
        label: Percent Customer Daily Zero Amount Orders
        numerator: customer_daily_zero_amount_orders_count
        denominator: customer_daily_order_count

      - name: customer_daily_avg_order_amount_over_20
        description: Average customer-day order amount for orders over 20.
        type: ratio
        label: Customer Daily Avg Order Amount Over 20
        numerator: customer_daily_order_amount_over_20
        denominator: customer_daily_orders_over_20_count

      - name: customer_daily_order_value_over_20_premium
        description: Difference between daily order value over 20 and average daily order value.
        type: derived
        label: Customer Daily Order Value Over 20 Premium
        expr: customer_daily_avg_order_amount_over_20 - customer_daily_avg_order_amount
        input_metrics:
          - name: customer_daily_avg_order_amount_over_20
          - name: customer_daily_avg_order_amount
