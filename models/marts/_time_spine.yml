models:
  - name: metricflow_time_spine # Ensure this matches your .sql filename EXACTLY
    description: "Daily time spine for Semantic Layer"
    time_spine:
      standard_granularity_column: date_day  # Changed from date_hour to date_day
      custom_granularities:
        - name: fiscal_year
          column_name: fiscal_year_column
    columns:
      - name: date_day
        granularity: day                     # Changed from hour to day
      - name: fiscal_year_column
