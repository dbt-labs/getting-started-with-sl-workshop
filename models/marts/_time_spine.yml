version: 2

models:
  - name: time_spine_daily
    description: Daily time spine used by cumulative semantic-layer metrics to backfill missing calendar dates.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Calendar date at day grain.
        granularity: day
        data_tests:
          - unique
          - not_null
