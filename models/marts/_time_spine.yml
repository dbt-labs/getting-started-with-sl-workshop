version: 2

models:
  - name: metricflow_time_spine
    description: Daily time spine used by MetricFlow for cumulative metrics and other time-based semantic layer queries.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Calendar date at daily grain used as the standard join column for the time spine.
        granularity: day
