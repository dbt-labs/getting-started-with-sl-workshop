models:
  - name: fct_customer_weekly
    description: Weekly customer order fact table with one row per customer per week.
    semantic_model:
      enabled: true
      name: customer_weekly
    agg_time_dimension: order_week
    primary_entity: customer
    columns:
      - name: customer_id
        description: Customer for the weekly grain.
        entity:
          type: foreign
          name: customer

      - name: order_week
        description: Order week for the weekly customer grain.
        granularity: week
        dimension:
          type: time
          name: order_week

    metrics:
      - name: customer_weekly_order_count
        description: Total number of customer-week orders.
        type: simple
        label: Customer Weekly Order Count
        agg: sum
        expr: order_count

      - name: customer_weekly_order_amount
        description: Total customer-week order amount.
        type: simple
        label: Customer Weekly Order Amount
        agg: sum
        expr: order_amount

      - name: customer_weekly_avg_order_amount
        description: Average order amount across customer-week rows.
        type: simple
        label: Customer Weekly Avg Order Amount
        agg: average
        expr: avg_order_amount

      - name: customer_weekly_orders_over_20_count
        description: Number of customer-week orders over 20.
        type: simple
        label: Customer Weekly Orders Over 20 Count
        agg: sum
        expr: orders_over_20_count

      - name: customer_weekly_order_amount_over_20
        description: Total customer-week order amount over 20.
        type: simple
        label: Customer Weekly Order Amount Over 20
        agg: sum
        expr: order_amount_over_20

      - name: customer_weekly_zero_amount_orders_count
        description: Number of customer-week orders with zero amount.
        type: simple
        label: Customer Weekly Zero Amount Orders Count
        agg: sum
        expr: zero_amount_orders_count

      - name: pct_customer_weekly_orders_over_20
        description: Percentage of customer-week orders over 20.
        type: ratio
        label: Percent Customer Weekly Orders Over 20
        numerator: customer_weekly_orders_over_20_count
        denominator: customer_weekly_order_count

      - name: pct_customer_weekly_zero_amount_orders
        description: Percentage of customer-week orders with zero amount.
        type: ratio
        label: Percent Customer Weekly Zero Amount Orders
        numerator: customer_weekly_zero_amount_orders_count
        denominator: customer_weekly_order_count

      - name: customer_weekly_avg_order_amount_over_20
        description: Average customer-week order amount for orders over 20.
        type: ratio
        label: Customer Weekly Avg Order Amount Over 20
        numerator: customer_weekly_order_amount_over_20
        denominator: customer_weekly_orders_over_20_count

      - name: customer_weekly_order_value_over_20_premium
        description: Difference between weekly order value over 20 and average weekly order value.
        type: derived
        label: Customer Weekly Order Value Over 20 Premium
        expr: customer_weekly_avg_order_amount_over_20 - customer_weekly_avg_order_amount
        input_metrics:
          - name: customer_weekly_avg_order_amount_over_20
          - name: customer_weekly_avg_order_amount
