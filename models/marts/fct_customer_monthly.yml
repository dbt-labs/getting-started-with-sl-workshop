models:
  - name: fct_customer_monthly
    description: Monthly customer order fact table with one row per customer per month.
    semantic_model:
      enabled: true
      name: customer_monthly
    agg_time_dimension: order_month
    primary_entity: customer
    columns:
      - name: customer_id
        description: Customer for the monthly grain.
        entity:
          type: foreign
          name: customer

      - name: order_month
        description: Order month for the monthly customer grain.
        granularity: month
        dimension:
          type: time
          name: order_month

    metrics:
      - name: customer_monthly_order_count
        description: Total number of customer-month orders.
        type: simple
        label: Customer Monthly Order Count
        agg: sum
        expr: order_count

      - name: customer_monthly_order_amount
        description: Total customer-month order amount.
        type: simple
        label: Customer Monthly Order Amount
        agg: sum
        expr: order_amount

      - name: customer_monthly_avg_order_amount
        description: Average order amount across customer-month rows.
        type: simple
        label: Customer Monthly Avg Order Amount
        agg: average
        expr: avg_order_amount

      - name: customer_monthly_orders_over_20_count
        description: Number of customer-month orders over 20.
        type: simple
        label: Customer Monthly Orders Over 20 Count
        agg: sum
        expr: orders_over_20_count

      - name: customer_monthly_order_amount_over_20
        description: Total customer-month order amount over 20.
        type: simple
        label: Customer Monthly Order Amount Over 20
        agg: sum
        expr: order_amount_over_20

      - name: customer_monthly_zero_amount_orders_count
        description: Number of customer-month orders with zero amount.
        type: simple
        label: Customer Monthly Zero Amount Orders Count
        agg: sum
        expr: zero_amount_orders_count

      - name: pct_customer_monthly_orders_over_20
        description: Percentage of customer-month orders over 20.
        type: ratio
        label: Percent Customer Monthly Orders Over 20
        numerator: customer_monthly_orders_over_20_count
        denominator: customer_monthly_order_count

      - name: pct_customer_monthly_zero_amount_orders
        description: Percentage of customer-month orders with zero amount.
        type: ratio
        label: Percent Customer Monthly Zero Amount Orders
        numerator: customer_monthly_zero_amount_orders_count
        denominator: customer_monthly_order_count

      - name: customer_monthly_avg_order_amount_over_20
        description: Average customer-month order amount for orders over 20.
        type: ratio
        label: Customer Monthly Avg Order Amount Over 20
        numerator: customer_monthly_order_amount_over_20
        denominator: customer_monthly_orders_over_20_count

      - name: customer_monthly_order_value_over_20_premium
        description: Difference between monthly order value over 20 and average monthly order value.
        type: derived
        label: Customer Monthly Order Value Over 20 Premium
        expr: customer_monthly_avg_order_amount_over_20 - customer_monthly_avg_order_amount
        input_metrics:
          - name: customer_monthly_avg_order_amount_over_20
          - name: customer_monthly_avg_order_amount
