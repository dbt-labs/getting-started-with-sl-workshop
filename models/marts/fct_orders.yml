version: 2

models:
  - name: fct_orders
    description: orders with customer association, order date, and collected payment amount.
    columns:
      - name: order_id
        description: unique identifier for an order.
      - name: customer_id
        description: unique identifier for the customer who placed the order.
      - name: order_date
        description: date the order was placed.
      - name: amount
        description: total successful payment amount collected for the order.
