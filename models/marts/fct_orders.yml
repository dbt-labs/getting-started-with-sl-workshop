version: 2

models:
  - name: fct_orders
    description: order-level fact table with one row per customer order and the total successful payment amount for that order.
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: order_date
    columns:
      - name: order_id
        entity:
          type: primary
          name: order_id
        description: unique identifier for an order.
      - name: customer_id
        entity:
          type: foreign
          name: customer_id
        description: unique identifier for the customer who placed the order.
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
          name: order_date
      - name: amount
        description: total amount successfully paid for the order in dollars.

    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_value
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: large_orders_over_twenty
        description: count of orders with order total over 20 dollars.
        type: simple
        agg: sum
        expr: case when amount >= 20 then 1 else 0 end

metrics:
  - name: large_orders_percentage
    type: ratio
    numerator: large_orders_over_twenty
    denominator: distinct_orders

  - name: average_order_value
    description: average order value.
    type: ratio
    numerator: revenue
    denominator: distinct_orders

  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days


  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month
