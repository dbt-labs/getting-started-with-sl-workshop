version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
      name: orders

    agg_time_dimension: order_date
    description: Fact table with one row per order and the successful payment amount associated with that order.
    columns:
      # Entities
      - name: order_id
        entity:
          type: primary
          name: order_id
      - name: customer_id
        entity:
          name: customer
          type: foreign
      # Newly added - Dimensions      
      - name: order_date
        granularity: day
        dimension:
          type: time
      - name: amount
        dimension:
          type: categorical

      # - name: order_id
      #   description: Primary key for the order.
      #   data_tests:
      #     - not_null
      #     - unique

      # - name: customer_id
      #   description: Foreign key to the customer who placed the order.
      #   data_tests:
      #     - not_null

      # - name: order_date
      #   description: Date the order was placed.
      #   data_tests:
      #     - not_null

      # - name: amount
      #   description: Total successful payment amount for the order, defaulting to 0 when no successful payment exists.
    metrics:
      - name: order_total
        description: The total amount for each order including taxes
        type: simple
        label: Order total
        agg: sum
        expr: amount

      - name: order_count
        type: simple
        label: Order count
        agg: sum
        expr: 1

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id
      
      - name: customers_with_orders
        description: Distinct count of customers placing orders
        type: simple
        label: Customers with orders
        agg: count_distinct
        expr: customer_id

      - name: order_value_p99
        type: simple
        label: Order value P99
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: discrete

      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: Average revenue
        type: simple
        agg: average
        expr: amount

      - name: orders_over_twenty
        description: Count of orders with order total over 20
        type: simple
        label: Large orders
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

metrics:
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: average_order_value
    type: ratio
    numerator: revenue
    denominator: distinct_orders


 #CUMULATIVE METRICS 
  - name: cumulative_revenue_30d
    type: cumulative
    input_metric: revenue
    window: 30 days

# derived metrics

  # - name: large_orders_


  - name: "pct_of_orders_that_are_large"
    label: "pct_of_orders_that_are_large"
    description: "percent of orders that are large"
    type: derived
    expr: orders_over_twenty / order_count
    input_metrics:
      - name: orders_over_twenty
      - name: order_count