version: 2

models:
  - name: fct_orders
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    description: "Order-level fact table with one row per order, combining core order attributes with the total successful payment amount collected for that order. Use this model for order volume, customer_id order history, and paid amount analysis."
    columns:
    ## Entities
      - name: order_id
        entity:
          type: primary
          name: order_id
        description: "Primary key for the order. One row per order in this model."
        data_tests:
          - not_null
          - unique
    
      - name: customer_id
        description: "Foreign key to the customer who placed the order. Joins to customer models such as `dim_customers`."
        entity:
          name: customer_id
          type: foreign
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
    ## Dimensions
      - name: order_date
        description: "Date the order was placed, sourced from the raw orders data."
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount ## used for filtering later
        description: "Total successful payment amount collected for the order in dollars. Failed or pending payments are excluded, and orders without a successful payment default to 0."
        dimension:
          type: categorical
    ## Metrics
    metrics:
      - name: revenue
        type: simple
        agg:  sum
        expr: amount

      - name: avg_revenue
        type: simple
        label: simple metrics of averge amount
        agg:  average
        expr: amount

      - name: distinct_customers
        type: simple
        agg:  count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg:  count_distinct
        expr: order_id

      - name: order_value_agg
        type: simple
        agg:  percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_agg
        type: simple
        agg:  percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20
          
## advanced metrics
metrics:
    ## Ratio metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders
  
  - name: averge_order_value
    label: ratio metrics of revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders

## cummulative metrics
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days
  
  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

     
  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue

## derived metrics
  - name: large_orders_percentage_derived
    label: Derived metrics calulating large orders percentage
    type: derived
    expr: orders_over_twenty/distinct_orders
    input_metrics:
      - name: orders_over_twenty
      - name: distinct_orders
      
      