version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    description: Final order fact table with one row per order with the customer_id,order_date and the total successful payment amount for that order.
    
    columns:
    ## entities
      - name: order_id
        description: Primary key for the order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign

      ## dimensions
      - name: order_date
        description: Date the order was placed.
        granularity: day
        dimension:
          type: time

      - name: amount ## used for filtering later
        description: Total successful payment amount for the order in dollars. Defaults to 0 when an order has no successful payments.
        dimension:
          type: categorical


    ## metrics
    metrics: ## simple metrics where the data lives. should be in line with column
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: simple metric average amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_20
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20  
        ## entity double underscore then dimension : order_id__amount

metrics: ##advanced metrics under top-level metric key. should be in line with models
  ## ratio metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_20
    denominator: distinct_orders

  - name: avg_orders_value
    label: Ratio metric revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders

## Cumulative type metrics
  - name: cumulative_revenue_l30d
    label: cumulative revenue last 30 days
    type: cumulative
    input_metric: revenue 
    window: 30 days ## previous dates

 ## Cumulative type metrics
  - name: cumulative_revenue_mtd
    label: cumulative revenue month to date
    type: cumulative
    input_metric: revenue  
    grain_to_date: month  ## start at first and go till current date

 ## Cumulative type metrics
  - name: cumulative_revenue_alltime
    type: cumulative
    input_metric: revenue  

## Derived metrics
  - name: large_orders_percentage_derived
    label: Derived metric calculating large orders percentage
    type: derived
    expr: orders_over_20 / distinct_orders
    input_metrics:
          - name: orders_over_20
          - name: distinct_orders
