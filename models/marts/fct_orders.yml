version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    description: Fact table with one row per order and the total successful payment amount collected for that order.
    columns:
      - name: order_id
        description: Primary key for the order.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: order_id

      - name: customer_id
        description: Identifier for the customer who placed the order.
        entity:
          name: customer
          type: foreign
# Dimensions 
      - name: order_date
        description: Date the order was placed.
        granularity: day
        dimension:
          type: time

      - name: amount
        description: Total amount paid successfully for the order in dollars. Defaults to 0 when an order has no successful payments.
        dimension:
          type: categorical

    # Newly added - Simple metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

