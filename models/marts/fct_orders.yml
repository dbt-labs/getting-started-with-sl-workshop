version: 2

models:
  - name: fct_orders
    description: one row per order with the customer, order date, and total successful payment amount.
    columns:
      - name: order_id
        description: unique identifier for an order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        data_tests:
          - not_null
      - name: order_date
        description: date the order was placed.
        data_tests:
          - not_null
      - name: amount
        description: total amount successfully paid for the order in dollars.
        data_tests:
          - not_null
