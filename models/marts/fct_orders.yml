version: 2

models:
  - name: fct_orders
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    description: one row per order with the customer_id, order date, and total succesful payment amount.
    columns:
    ## entities
      - name: order_id
        description: unique identifier for an order.
        data_tests:
          - unique
          - not_null
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        data_tests:
          - not_null
        entity:
          name: customer_id
          type: foreign
    ## dimensions
      - name: order_date
        description: date the order was placed.
        data_tests:
          - not_null
        granularity: day
        dimension:
          type: time
      - name: amount
        description: total amount successfully paid for the order.
        dimension:
          type: categorical
        
      ## metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount
      
      - name: avg_revenue
        label: Simple metric of average amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id_amount') }} >= 20
## advanced metrics
metrics:
  ## ratio metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: average_order_value
    label: Ratio metric of revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders
  
  ## cumulative metrics
  - name: cumulative_revenue
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

