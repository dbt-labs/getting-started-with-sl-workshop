version: 2

models:
  - name: fct_orders
    description: fact table with one row per order and the key customer, date, and revenue details used for order reporting.
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: order_date
    columns:
      ## Entities
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign
        data_tests:
          - not_null
      ## Dimensions
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount
        description: total successful payment amount associated with the order.
        dimension:
          type: categorical
        data_tests:
          - not_null
    ## Simple Metrics
    metrics:
      - name: avg_order_value
        label: Average order value using simple metric
        type: simple
        agg: average
        expr: amount
      - name: order_total
        description: The total amount for each order including taxes
        type: simple
        label: Order total
        agg: sum
        expr: amount
      - name: order_count
        type: simple
        label: Order count
        agg: sum
        expr: 1
      - name: customers_with_orders
        description: Distinct count of customers placing orders
        type: simple
        label: Customers with orders
        agg: count_distinct
        expr: customer_id
      - name: order_value_discrete_p99
        type: simple
        label: Order value P99 Discrete
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete
      - name: order_value_continuous_p99
        type: simple
        label: Order value P99 Continuous
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous
      - name: orders_over_20
        description: Count of orders with order total over 20
        type: simple
        label: Large orders
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20
      - name: cumulative_order_amount_mtd
        label: Cumulative order amount MTD
        description: The month to date value of all orders
        type: cumulative
        grain_to_date: month
        input_metric: order_total
      - name: cumulative_order_amount_30d
        type: cumulative
        input_metric: order_total
        window: 30 days

## Advanced Metrics
metrics:
  ## Ratio Metric
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_20
    denominator: order_count
  - name: avg_order_value_2
    label: Average order value using ratio metric
    description: Average value of each order
    type: ratio
    numerator: order_total
    denominator: order_count
  ## Derived Metric
  - name: large_orders_percentage_derived
    type: derived
    expr: orders_over_20 / order_count
    input_metrics:
      - name: orders_over_20
      - name: order_count

saved_queries:
  - name: order_metrics
    label: example
    query_params:
      metrics:
        - order_count
        - order_total
        - orders_over_20
        - large_orders_percentage_derived
      group_by:
        - TimeDimension('order_id__order_date', 'day')


    exports:
      - name: order_metrics
        config: 
          export_as: table
          schema: analytics
      