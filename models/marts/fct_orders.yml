version: 2

models:
  - name: fct_orders
    description: orders fact table with one row per customer order.
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
          name: order_date
        data_tests:
          - not_null
      - name: amount
        description: total successful payment amount collected for the order in dollars.
        data_tests:
          - not_null
    metrics:
      - name: revenue
        description: total successful payment amount from orders.
        label: Revenue
        type: simple
        agg: sum
        expr: amount
      - name: avg_revenue
        description: average successful payment amount per order.
        label: Average Revenue
        type: simple
        agg: average
        expr: amount
      - name: distinct_customers
        description: count of customers who placed orders.
        label: Distinct Customers
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: order_value_p99
        description: 99th percentile order payment amount.
        label: Order Value P99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous
