models:
  - name: fct_orders
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: order_date

    columns:
      - name: order_id
        entity:
          name: orders
          type: primary

      - name: customer_id
        entity:
          name: customer
          type: foreign

      - name: order_date
        granularity: day
        dimension:
          type: time

      - name: amount
        description: Total successful payment amount captured for the order.
        dimension:
          type: categorical

    metrics:
      - name: order_total
        label: Order total
        description: Sum of successful payment amounts across orders.
        type: simple
        agg: sum
        expr: amount

      - name: order_count
        label: Order count
        description: Count of orders.
        type: simple
        agg: count
        expr: order_id

      - name: customers_with_orders
        label: Customers with orders
        description: Distinct count of customers placing orders.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: large_orders
        label: Large orders
        description: Count of orders with order total of at least 20.
        type: simple
        agg: count
        expr: order_id
        filter: |
          {{ Dimension('orders__amount') }} >= 20

      - name: avg_order_value
        label: Average order value
        description: Average value of each order.
        type: ratio
        numerator: order_total
        denominator: order_count

      - name: cumulative_order_amount_mtd
        label: Cumulative order amount MTD
        description: Month-to-date value of all orders.
        type: cumulative
        input_metric: order_total
        grain_to_date: month

      - name: pct_of_orders_that_are_large
        label: Percent of orders that are large
        description: Percent of orders with order total of at least 20.
        type: derived
        expr: large_orders / order_count
        input_metrics:
          - name: large_orders
          - name: order_count
