version: 2

models:
  - name: fct_orders
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    description: orders fact table with one row per order with customer_id and the associated payment amount.
    columns:
   ## entities 
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign
        data_tests:
          - not_null
   ## Dimensions     
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount ## used for filtering later 
        description: total successful payment amount for the order in dollars.
        dimension:  
          type: categorical
   ## Metrics 
    metrics:    
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: Simple metric of average amount
        type: simple
        agg: sum
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

##        data_tests:
##          - not_null
      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        description: Count of orders with order total over 20
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20  
        ## Double underscore to indicate a column
## advanced metrics
metrics:
##ratio metrics 
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: avg_order_value
    label: Ratio metric of revenue divided by distinct orders 
    type: ratio
    numerator: revenue
    denominator: distinct_orders  

 ## cumulative metrics 
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue
  
 # Derived metric
  - name: pct_of_orders_that_are_large
    label: Derived metric calculating large orders  percentage 
       # description: Percent of orders that are large
    type: derived
    expr: orders_over_twenty / distinct_orders
    input_metrics:
        - name: orders_over_twenty
        - name: distinct_orders 