version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    description: order-level fact table with one row per order and the associated successfully paid amount.
    columns:
      - name: order_id
        description: unique identifier for the order.
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          type: foreign
          name: customer_id
      - name: order_date
        description: date when the order was placed.
        granularity: day
        dimension:
          type: time
      - name: amount
        description: total successfully paid amount for the order.

    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount
      - name: avg_revenue
        type: simple
        agg: average
        expr: amount
      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id
metrics:
  - name: average_order_value
    label: descripcion de la metrica...
    type: ratio
    numerator: revenue
    denominator: distinct_orders
