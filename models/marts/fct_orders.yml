version: 2

models:
  - name: fct_orders
    description: one row per order with the customer, order date, and total successful payment amount.
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: identifier for the customer who placed the order.
        entity:
          name: customer
          type: foreign
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
      - name: amount
        description: total successful payment amount collected for the order.
        dimension:
          type: categorical

    metrics:
      - name: revenue
        description: Revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_order_value
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_discrete_pct99
        type: simple
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: discrete

      - name: order_value_pct
        type: simple
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: continuous

      - name: large_orders_over20
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

metrics:
  - name: large_orders_precentage
    type: ratio
    numerator: large_orders_over20
    denominator: distinct_orders

  - name: average_order_value
    label: Ratio metric of revenue
    type: ratio
    numerator: revenue
    denominator: distinct_orders

  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue


  - name: pct_of_orders_that_are_large
    label: parent of orders that are large
    type: derived
    expr: large_orders_over20 / distinct_orders
    input_metrics:
      - name: large_orders_over20
      - name: distinct_orders
