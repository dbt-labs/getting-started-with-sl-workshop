version: 2

models:
  - name: fct_orders

    semantic_model: 
      enabled: true

    agg_time_dimension: order_date

    description: orders fact table with one row per order and the associated successful payment amount.
    columns:
      # Entities
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null

      # Dimensions
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount  ## used for filtering later
        description: total successful payment amount recorded for the order.
        data_tests:
          - not_null
        dimension:
          type: categorical

    # Simple Metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        type: simple
        agg: average
        expr: amount

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id        

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

  # Advanced metrics
  metrics:
    - name: large_orders_percentage
      type: ratio
      numerator: orders_over_twenty
      denominator: distinct_orders