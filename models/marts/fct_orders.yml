version: 2

models:
  - name: fct_orders
    description: order-level fact table with one row per order and the total successful payment amount.
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          name: customer
          type: foreign
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
      - name: amount
        description: amount
        dimension: categorical
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount
      - name: biggest_order
        type: simple
        agg: max
        expr: amount
      
      - name: total_distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id
      
      - name: average_order_value
        label: Simple metric average amount
        type: simple
        agg: average
        expr: amount
      
      - name: order_value_per_99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_per_99_discrete
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete
      
      - name: order_over_twenty
        description: Count of orders with order total over 20
        type: simple
        label: Large orders
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

metrics:
  - name: lagest_order_by_percentage
    type: ratio
    numerator: order_over_twenty
    denominator: total_distinct_orders

  - name: avg_order_value
    label: Ratio metric revenue divided by distinct orders
    type: ratio 
    numerator: revenue 
    denominator: total_distinct_orders


  - name: cummulative_revenue
    label: Commulativr metric 
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cummulative_revenue_mtd
    type: cumulative
    input_metric:  revenue
    grain_to_date: month

  - name: cummulative_revenue_all_time
    type: cumulative
    input_metric:  revenue

## Derived metrics
  - name: large_order_derived
    type: derived
    expr: order_over_twenty / total_distinct_orders
    input_metrics: 
      - name: total_distinct_orders
      - name: order_over_twenty
