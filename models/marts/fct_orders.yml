version: 2

models:
- name: fct_orders
  semantic_model:
    enabled: true
  description: one row per order with the customer_id, order date, and total successful payment amount.
  columns:
  - name: order_id
    description: unique identifier for the order.
   
    ## entities
    entity:
      type: primary
      name: order_id
  - name: customer_id
    description: identifier for the customer who placed the order.
    entity:
      name: customer
      type: foreign
    data_tests:
      - not null
      - unique

  ## dymensions
  - name: order_date
    description: date when the order was placed.
    granularity: day
    dimension:
      type: time
  - name: amount
    description: total amount successfully paid for the order.
    dimension:
      type: categorical

  ## metrics
  metrics:
  - name: revenue
    type: simple
    agg: sum
    expr: amount