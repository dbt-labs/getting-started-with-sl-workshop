version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    description: one row per order with the customer, order date, and successfully collected payment amount.
    columns:
      ##entities
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          name: customer
          type: foreign
      ##dimensions
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
      - name: amount
        description: total successfully collected payment amount for the order in dollars.
        dimension:
          type: categorical

    ## metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: simple metric of avg amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        label: Order value P99
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        label: Order value P99 (discrete)
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        description: "Count of orders with order total over 20."
        type: simple
        agg: sum
        label: "Large Orders"
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

metrics: ## advanced metrics

#Ratio type metric
  - name: avg_order_value
    description: "average value of each order"
    label: avg_order_value    
    type: ratio
    numerator: revenue
    denominator: distinct_orders

  - name: large_orders_percentage 
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: cumulative_revenue 
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  ## derived metrics
  # Derived metric
  - name: "large_order_percentage_derived"
    label: "large_order_percentage_derived"
    description: "percent of orders that are large"
    type: derived
    expr: orders_over_twenty / distinct_orders
    input_metrics:
      - name: orders_over_twenty
      - name: distinct_orders
