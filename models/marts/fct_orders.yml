version: 2

models:
  - name: fct_orders
    description: Fact table at the order grain with one row per order and the successfully paid amount for that order.
    semantic_model: 
      enabled: true 
    agg_time_dimension: order_date
    columns:
      ## Entities
      - name: order_id
        description: Primary key for the order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign
        data_tests:
          - not_null

      ## Dimensions
      - name: order_date
        description: Date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null

      - name: amount ## used for filtering
        description: Total successful payment amount captured for the order. Defaults to 0 when no successful payment exists.
        dimension:
          type: categorical
        data_tests:
          - not_null
    ## metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: simple metric - agg average
        type: simple
        agg: average
        expr: amount

      - name: didtinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount  
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount  
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_20
        description: Count of orders with order total over 20
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20
## Advanced Metrics
metrics:
  ## Ratio Metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_20
    denominator: distinct_orders

  - name: average_order_value
    label: Adv metric - Ratio revenue to didstinct orders 
    type: ratio
    numerator: revenue
    denominator: distinct_orders
  ## Cumulative Metrics
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  ## Derived Metrics
  - name: large_orders_perceentage_derived
    label: Derived metric calculating large orders percentage
    type: derived
    expr: orders_over_20 / distinct_orders
    input_metrics:
          - name: orders_over_20
          - name: distinct_orders
    
