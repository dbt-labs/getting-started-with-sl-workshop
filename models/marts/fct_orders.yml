version: 2

models:
  - name: fct_orders
    semantic_model:
        enabled: true
    agg_time_dimension: order_date
    description: "one row per order with the customer, order date, and total successful payment amount."
    columns:
      ##entities (a.k.a. join keys)
      - name: order_id
        description: "unique identifier for an order."
        entity:
          type: primary
          name: order_id
      - name: customer_id
        description: "identifier for the customer who placed the order."
        entity:
          name: customer
          type: foreign
      ##dimensions
      - name: order_date
        description: "date the order was placed."
        granularity: day
        dimension:
          type: time
      - name: amount
        description: "total amount successfully paid for the order in dollars."
        dimension:
          type: categorical
    ##metrics
    metrics:
      ##simple metrics
      - name: revenue
        type: simple
        agg: sum
        expr: amount
      - name: avg_revenue
        label: simple metric of average amount
        type: simple  
        agg: average
        expr: amount
      - name: order_valuediscrete_p99
        type: simple
        label: Order value P99
        agg: percentile
        expr: amount
        percentile: 99.0
        percentile_type: discrete
      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id
      - name: orders_over_twenty
        description: Count of orders with order total over 20
        type: simple
        label: Large orders
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20
##advanced metrics
metrics:
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders
  - name: average_order_value
    type: ratio 
    numerator: revenue
    denominator: distinct_orders
##cumulative metrics
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days
  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month
  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue
##derived metrics
  - name: large_orders_percentage_derived
    label: Derived metric calculating large orders percentage
    type: derived
    expr: orders_over_twenty / distinct_orders
    input_metrics:
      - name: orders_over_twenty
      - name: distinct_orders


