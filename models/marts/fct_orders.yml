version: 2

models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    description: Fact table at the order grain with one row per order, including the customer, order date, and total successful payment amount.
    columns:
      ## entities
      - name: order_id
        description: Primary key for the order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Unique identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign

      ## dimensions
      - name: order_date
        description: Date the order was placed.
        granularity: day
        dimension:
          type: time
      - name: amount
        description: Total amount of successful payments applied to the order. Defaults to 0 when no successful payment exists.
        dimension:
          type: categorical

    ## simple metrics
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: avg_revenue
        label: Simple metric of average revenue amount.
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

## advanced metrics
metrics:
  ## ratio metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: orders

  - name: average_order_value
    label: Ratio metric of revenue divided by orders.
    type: ratio
    numerator: revenue
    denominator: orders

  ## cumulative metrics
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  ## Derived metric
  - name: large_orders_percentage_derived
    label: Derived metric calculating large order percentage.
    type: derived
    expr: orders_over_twenty / orders
    input_metrics:
      - name: orders_over_twenty
      - name: orders

saved_queries:
  - name: order_metrics
    label: example
    query_params:
      metrics:
        - large_orders_percentage
        - revenue
        - orders
        - orders_over_twenty
      group_by:
        - TimeDimension('__order_date', 'day')
    exports:
      - name: order_metrics
        config:
          export_as: table
          schema: analytics
      