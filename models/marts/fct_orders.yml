version: 2

models:
  - name: fct_orders
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    description: orders fact table with one row per order and the associated paid amount.
    columns:
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          name: customer_id
          type: foreign
        data_tests:
          - not_null
      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          name: order_date
          type: time
      - name: amount  ## use for filter later
        description: total successful payment amount recorded for the order.
        dimension:
          name: amount
          type: categorical
    metrics:
      # Simple type metrics
      - name: order_total
        description: Sum of orders value
        type: simple
        label: Order total
        agg: sum
        expr: amount
      - name: order_average
        description: Avg of orders value
        type: simple
        label: Order Average Amount
        agg: average
        expr: amount
      - name: order_count
        description: Number of orders
        type: simple
        label: Order count
        agg: sum
        expr: 1
      - name: customers
        description: Number of distinct customers
        type: simple
        label: Customers
        agg: count_distinct
        expr: customer_id
      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous
      - name: order_value_p99_discrete
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete
      - name: orders_over_20
        description: Count of orders with order total over 20
        type: simple
        label: Large orders
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20
metrics:
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_20
    denominator: order_count
  - name: average_order_value
    label: Order Average Amount (high level ratio)
    type: ratio
    numerator: order_total
    denominator: order_count
  - name: revenue_mtd_cumulative
    label: Cumulative order amount MTD
    description: The month to date value of all orders
    type: cumulative
    input_metric: order_total
    grain_to_date: month
  - name: revenue_last_7_days
    label: Cumulative order amount over last 7 days
    description: Cumulative order amount over last 7 days
    type: cumulative
    input_metric: order_total
    window: 7 days
