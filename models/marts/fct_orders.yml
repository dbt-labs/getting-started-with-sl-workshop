version: 2

models:
  - name: fct_orders
    description: orders fact table with one row per order and the total successful payment amount collected for that order.
    semantic_model:
      enabled: true
      name: name_override # optional
    agg_time_dimension: order_date
    columns:
      - name: order_id
        entity:
          type: primary
          name: order_id
        description: unique identifier for an order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        entity:
          type: foreign
          name: customer_id
        description: unique identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_date
        description: date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount
        description: total amount successfully paid for the order in dollars.
        dimension: 
          type: categorical
        data_tests:
          - not_null
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount
        
      - name: avg_order_value
        label: Simple metric of raverage amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_20
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount')}} >=20

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id
# Advanced Metrics
metrics:
#  Ratio Metrics
  - name: large_orders_percentage
    type: ratio 
    numerator: orders_over_20
    denominator: distinct_orders

  - name: average_order_value
    label: Ratio metric of revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders
# Cumulative Metrics
  - name: cumulative_revenue_l30d
    type: cumulative
    input_metric: revenue
    window: 30 days
  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue


# Derived Metrics
  - name: large_orders_percentage_derived
    label: Derived metric calculating large orders percentage
    type: derived
    expr: orders_over_20 / distinct_orders
    input_metrics:
      - name: orders_over_20
      - name: distinct_orders