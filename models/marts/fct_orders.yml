models:
  - name: fct_orders
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    description: Fact table at the order grain with one row per order and total successful payment amount.
    columns:
      - name: order_id
        description: Primary key for each order.

        ## entities
        entity: 
          type: primary
          name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier for the customer who placed the order.
        entity: 
          type: foreign
          name: customer_id

      - name: order_date
        description: Date the order was placed.
        granularity: day

        ## dimensions
        dimension: 
          type: time
          name: order_date

      - name: amount ## used for filtering later
        description: Total successful payment amount for the order in dollars. Defaults to 0 when no successful payment exists.
        dimension: 
          type: categorical
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount
      
      - name: avg_revenue
        label: Simple metric of average amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_continuous_p99
        type: simple
        agg: percentile
        expr: amount 
        percentile: 0.99
        percentile_type: continuous

      - name: order_value_discrete_p99
        type: simple
        agg: percentile
        expr: amount 
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

      - name: cumulative_revenue
        type: cumulative
        input_metric: revenue
        window: 30 days
        period_agg: first

      - name: cumulative_revenue_mtd
        type: cumulative
        input_metric: revenue
        grain_to_date: month
        period_agg: first

      - name: cumulative_revenue_all_time
        type: cumulative
        input_metric: revenue
        period_agg: first

## Advanced Metrics
metrics:
  ## Ratio metrics
  - name: large_orders_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: average_order_value
    label: Ratio metric of revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders





  ## derived metrics
  - name: "pct_of_orders_that_are_large"
    label: "pct_of_orders_that_are_large"
    description: "percent of orders that are large"
    type: derived
    expr: orders_over_twenty / distinct_orders
    input_metrics:
      - name: orders_over_twenty
      - name: distinct_orders
