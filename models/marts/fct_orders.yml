version: 2

models:
  - name: fct_orders
    description: order-level fact table with the customer, order date, and successfully captured payment amount for each order.
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: unique identifier for an order.
        entity:
          type: primary
          name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: unique identifier for the customer who placed the order.
        entity:
          name: customer
          type: foreign
        data_tests:
          - not_null
      - name: order_date
        description: date when the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: amount
        description: total successfully captured payment amount for the order in dollars.
        dimension:
          type: categorical
    #simple metric
    metrics:
      - name: revenue
        type: simple
        agg: sum
        expr: amount

      - name: avg_revenue
        label: Simple metric of average amount
        type: simple
        agg: average
        expr: amount

      - name: distinct_customers
        type: simple
        agg: count_distinct
        expr: customer_id
      
      - name: distinct_orders
        type: simple
        agg: count_distinct
        expr: order_id

      - name: order_value_p99
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: continuous
      
      - name: order_value_p99_discrete
        type: simple
        agg: percentile
        expr: amount
        percentile: 0.99
        percentile_type: discrete

      - name: orders_over_twenty
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__amount') }} >= 20

  #advanced metric
metrics:
  - name: large_order_percentage
    type: ratio
    numerator: orders_over_twenty
    denominator: distinct_orders

  - name: avg_order_value
    label: Ratio metric of revenue divided by distinct orders
    type: ratio
    numerator: revenue
    denominator: distinct_orders

  ## cumulative metrics
  - name: cumulative_revenue
    type: cumulative
    input_metric: revenue
    window: 30 days

  - name: cumulative_revenue_mtd
    type: cumulative
    input_metric: revenue
    grain_to_date: month

  - name: cumulative_revenue_all_time
    type: cumulative
    input_metric: revenue

  ##derive metrics
  - name: large_order_percentage_derived
    label: Derived metric 
    type: derived
    expr: orders_over_twenty / distinct_orders
    input_metrics:
      - name: orders_over_twenty
      - name: distinct_orders