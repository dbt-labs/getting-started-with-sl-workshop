version: 2

models:
  - name: fct_orders
    description: One row per order with the customer who placed it, the order date, and the total successful payment amount captured for that order. This model is the clean fact table for order-level revenue and order volume analysis.
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: Primary key for the order, inherited from `stg_orders`.
        entity:
          type: primary
          name: orders
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Identifier for the customer who placed the order.
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        description: Date the order was placed.
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null

      - name: amount
        description: Sum of successful payment amounts for the order in dollars. Orders with no successful payments return `0`.
        data_tests:
          - not_null

    metrics:
      - name: order_count
        description: Count of orders in `fct_orders`.
        type: simple
        label: Order Count
        agg: count
        expr: 1

      - name: total_order_amount
        description: Total successful payment amount across orders in dollars.
        type: simple
        label: Total Order Amount
        agg: sum
        expr: amount

      - name: average_order_amount
        description: Average successful payment amount per order in dollars.
        type: simple
        label: Average Order Amount
        agg: average
        expr: amount

      - name: distinct_customers
        description: Count of distinct customers who placed orders.
        type: simple
        label: Distinct Customers
        agg: count_distinct
        expr: customer_id

      - name: revenue_per_customer
        description: Average order revenue per distinct customer.
        type: ratio
        label: Revenue per Customer
        numerator: total_order_amount
        denominator: distinct_customers

      - name: orders_per_customer
        description: Average number of orders per distinct customer.
        type: ratio
        label: Orders per Customer
        numerator: order_count
        denominator: distinct_customers

      - name: cumulative_total_order_amount
        description: Running total of successful payment amount over time.
        type: cumulative
        label: Cumulative Total Order Amount
        input_metric: total_order_amount

      - name: cumulative_order_count
        description: Running count of orders over time.
        type: cumulative
        label: Cumulative Order Count
        input_metric: order_count

      - name: amount_p95
        description: 95th percentile of order payment amount in dollars.
        type: simple
        label: Order Amount P95
        agg: percentile
        expr: amount
        percentile: 95.0
        percentile_type: discrete

      - name: large_order_count
        description: Count of orders with payment amount of at least 100 dollars.
        type: simple
        label: Large Order Count
        agg: count
        expr: 1
        filter: |
          {{ Dimension('orders__amount') }} >= 100

      - name: large_order_amount
        description: Total payment amount from orders with payment amount of at least 100 dollars.
        type: simple
        label: Large Order Amount
        agg: sum
        expr: amount
        filter: |
          {{ Dimension('orders__amount') }} >= 100

      - name: large_order_percentage
        description: Percentage of orders that qualify as large orders with payment amount of at least 100 dollars.
        type: ratio
        label: Large Order Percentage
        numerator: large_order_count
        denominator: order_count

      - name: cumulative_total_order_amount_l30d
        description: Trailing 30-day cumulative successful payment amount.
        type: cumulative
        label: Cumulative Total Order Amount Last 30 Days
        window: 30 days
        input_metric: total_order_amount

      - name: cumulative_total_order_amount_mtd
        description: Month-to-date cumulative successful payment amount.
        type: cumulative
        label: Cumulative Total Order Amount MTD
        grain_to_date: month
        input_metric: total_order_amount

      - name: cumulative_total_order_amount_l7d
        description: Trailing 7-day cumulative successful payment amount.
        type: cumulative
        label: Cumulative Total Order Amount Last 7 Days
        window: 7 days
        input_metric: total_order_amount

      - name: non_large_order_amount
        description: Revenue from orders below the large-order threshold.
        type: derived
        label: Non Large Order Amount
        expr: total_revenue - large_revenue
        input_metrics:
          - name: total_order_amount
            alias: total_revenue
          - name: large_order_amount
            alias: large_revenue

