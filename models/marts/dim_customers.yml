version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    description: >
      Customer dimension with one record per customer. Combines customer attributes
      from `stg_customers` with order history from `fct_orders`, including first and
      most recent order dates, total order count, and lifetime value.

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - unique
          - not_null

      - name: first_name
        description: Customer's given name from the staging customer record.
        dimension:
          type: categorical

      - name: last_name
        description: Customer's family name from the staging customer record.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first recorded order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent recorded order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical
        data_tests:
          - not_null

      - name: lifetime_value
        description: Total revenue generated by the customer across all recorded orders.
        dimension:
          type: categorical
          name: lifetime_value

    metrics:
      - name: customers
        description: Count of customers in the customer dimension.
        label: Customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: Total lifetime value summed across customers.
        label: Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value
        fill_nulls_with: 0

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: Total orders summed across customers.
        label: Total Customer Orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: customers_with_lifetime_value_over_100
        description: Count of customers whose lifetime value is greater than 100.
        label: Customers With Lifetime Value Over 100
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

