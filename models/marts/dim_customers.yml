version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    description: one row per customer with core customer details and order history summary.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
          name: first_name
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
          name: last_name
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
          name: first_order_date
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date
      - name: number_of_orders
        description: total number of orders placed by the customer.
        data_tests:
          - not_null
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
