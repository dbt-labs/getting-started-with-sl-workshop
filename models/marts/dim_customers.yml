version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    description: Customer dimension with one row per customer, including customer details, first and most recent order dates, order count, and lifetime value.
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers_lifetime_value_over_100
        description: Count of distinct customers whose lifetime value is greater than 100.
        label: Customers with Lifetime Value Over 100
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: "{{ Dimension('customer__lifetime_value') }} > 100"
