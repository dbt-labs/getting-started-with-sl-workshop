models:
  - name: dim_customers
    description: One row per customer with customer attributes and lifetime order summary metrics.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Unique identifier for a customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical
        data_tests:
          - not_null

      - name: lifetime_value
        description: Total lifetime revenue from the customer.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: Sum of customer lifetime value.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: Total number of orders across customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: average_customer_orders
        description: Average number of orders per customer.
        type: simple
        agg: average
        expr: number_of_orders
      
      

