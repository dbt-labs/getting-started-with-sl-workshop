version: 2

models:
  - name: dim_customers
    description: Customer dimension with one row per customer, including name fields and order history rollups like first order date, most recent order date, order count, and lifetime value.
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date

    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          type: primary
          name: customer_id
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: first_name
        description: Customer's first name.
        dimension:
          type: categorical
          name: first_name

      - name: last_name
        description: Customer's last name.
        dimension:
          type: categorical
          name: last_name

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time
          name: first_order_date

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical
          name: number_of_orders

      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.
        dimension:
          type: categorical
          name: lifetime_value

    metrics:
      - name: customer_count
        description: Count of customers.
        label: Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: high_value_customer_count
        description: Count of customers with lifetime value greater than 100.
        label: High Value Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__lifetime_value') }} > 100

      - name: total_customer_orders
        description: Total number of orders across all customers.
        label: Total Customer Orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_customer_lifetime_value
        description: Total lifetime value across all customers.
        label: Total Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value



