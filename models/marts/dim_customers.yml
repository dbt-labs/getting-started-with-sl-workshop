version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    description: customer-level dimension with each customer's profile and order history summary.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer_id
          type: primary
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: total number of orders placed by the customer.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers
        description: count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: new_customers
        description: count of customers by first order date.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: total lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: total number of orders across customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: average_orders_per_customer
        description: average number of orders per customer.
        type: simple
        agg: average
        expr: number_of_orders

      - name: customers_lifetime_value_over_100
        description: count of customers with lifetime value over 100.
        type: derived
        expr: customers_over_100
        input_metrics:
          - name: customers
            alias: customers_over_100
            filter: |
              {{ Dimension('customer_id__lifetime_value') }} > 100
