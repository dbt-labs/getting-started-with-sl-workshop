version: 2

models:
  - name: dim_customers
    description: customer dimension with one row per customer and summary attributes used for customer analysis.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date

    metrics:
      - name: customer_count
        description: Count of customers.
        label: Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_lifetime_value
        description: Sum of customer lifetime value across all customers.
        label: Total Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_lifetime_value
        description: Average customer lifetime value.
        label: Average Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_number_of_orders
        description: Sum of orders across all customers.
        label: Total Number of Orders
        type: simple
        agg: sum
        expr: number_of_orders

    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer
          type: primary

      - name: first_order_date
        description: date of the customer's first completed order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: date of the customer's most recent completed order.
        granularity: day
        dimension:
          type: time

      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical

      - name: number_of_orders
        description: total number of completed orders placed by the customer.

      - name: lifetime_value
        description: total revenue generated by the customer across all completed orders.
