version: 2

models:
  - name: dim_customers
    description: One row per customer with customer attributes and order history rolled up from `fct_orders`.
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer_id
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer's first name from the staging customer record.
        dimension:
          type: categorical

      - name: last_name
        description: Customer's last name from the staging customer record.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first recorded order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent recorded order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Count of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: Total order amount accumulated across all of the customer's orders.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        label: Customer Count
        description: Count of customers in the customer dimension.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        label: Customers With Orders
        description: Count of customers who have placed at least one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0

      - name: total_customer_lifetime_value
        label: Total Customer Lifetime Value
        description: Sum of customer lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        label: Average Customer Lifetime Value
        description: Average lifetime value across customers.
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        label: Total Customer Orders
        description: Sum of order counts across customers.
        type: simple
        agg: sum
        expr: number_of_orders

metrics:
  - name: customers_with_lifetime_value_over_100
    label: Customers With Lifetime Value Over 100
    description: Number of customers whose lifetime value is greater than 100.
    type: derived
    expr: customer_count
    input_metrics:
      - name: customer_count
        filter: |
          {{ Metric('average_customer_lifetime_value', group_by=['customer']) }} > 100
