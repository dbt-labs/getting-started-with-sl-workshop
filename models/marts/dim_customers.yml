version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
      name: customers
    agg_time_dimension: most_recent_order_date
    columns:
      - name: customer_id
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique

      - name: first_name
        dimension:
          type: categorical

      - name: last_name
        dimension:
          type: categorical

      - name: first_order_date
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        dimension:
          type: categorical

      - name: lifetime_value
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        label: Customer Count
        type: simple
        agg: count
        expr: 1

      - name: total_orders
        label: Total Orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_lifetime_value
        label: Total Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_lifetime_value
        label: Average Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: average_orders_per_customer
        label: Average Orders per Customer
        type: simple
        agg: average
        expr: number_of_orders

      - name: customers_with_lifetime_value_over_100
        label: Customers with Lifetime Value Over 100
        type: derived
        expr: qualifying_customers
        input_metrics:
          - name: customer_count
            alias: qualifying_customers
            filter: |
              {{ Dimension('customer__lifetime_value') }} > 100
