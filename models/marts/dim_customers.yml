models:
  - name: dim_customers
    description: One row per customer with core customer attributes and order lifecycle metrics, including first order date, most recent order date, order count, and lifetime value.

    semantic_model:
      enabled: true
      name: customers

    agg_time_dimension: first_order_date

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer first name from the staged customer record.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name from the staged customer record.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first recorded order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent recorded order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: Total order amount across all recorded orders for the customer.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Count of customers in the customer dimension.
        label: Customer count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: Sum of lifetime value across customers.
        label: Total customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: total_customer_orders
        description: Sum of customer order counts across customers.
        label: Total customer orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value

      - name: customers_with_lifetime_value_over_100
        description: Count of customers whose lifetime value is greater than 100.
        label: Customers with lifetime value over 100
        type: derived
        expr: high_value_customers
        input_metrics:
          - name: customer_count
            alias: high_value_customers
            filter: |
              {{ Dimension('customer__lifetime_value') }} > 100


