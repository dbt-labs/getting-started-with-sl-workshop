version: 2

models:
  - name: dim_customers
    description: One row per customer with order history rollups and lifetime value.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          type: primary
          name: customer

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.

      - name: lifetime_value
        description: Total successful payment amount across all customer orders.

    metrics:
      - name: customer_count
        label: Customer Count
        description: Count of customers.
        type: simple
        agg: count
        expr: 1

      - name: total_number_of_orders
        label: Total Number of Orders
        description: Sum of orders across customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_lifetime_value
        label: Total Lifetime Value
        description: Sum of customer lifetime value.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_lifetime_value
        label: Average Lifetime Value
        description: Average customer lifetime value.
        type: simple
        agg: average
        expr: lifetime_value

