version: 2

models:
  - name: dim_customers
    description: customer dimension with one row per customer and summary attributes about their order history.
    semantic_model: true
    agg_time_dimension: first_order_date

    metrics:
      - name: customer_count
        description: count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: total_customer_lifetime_value
        description: total lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value
      - name: total_customer_orders
        description: total number of orders aggregated across customers.
        type: simple
        agg: sum
        expr: number_of_orders
      - name: average_customer_lifetime_value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value
      - name: repeat_customer_count
        description: count of customers with more than one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 1
      - name: average_orders_per_customer
        description: average number of orders per customer.
        type: simple
        agg: average
        expr: number_of_orders

    derived_semantics:
      dimensions:
        - name: customer_full_name
          type: categorical
          description: customer's full name for display and grouping.
          expr: concat(first_name, ' ', last_name)
        - name: is_repeat_customer
          type: categorical
          description: flags whether the customer has placed more than one order.
          expr: case when number_of_orders > 1 then 'true' else 'false' end
        - name: customer_value_tier
          type: categorical
          description: lifetime value band used for segmentation.
          expr: |
            case
              when coalesce(lifetime_value, 0) >= 1000 then 'high_value'
              when coalesce(lifetime_value, 0) >= 250 then 'mid_value'
              when coalesce(lifetime_value, 0) > 0 then 'low_value'
              else 'no_value'
            end
        - name: order_frequency_segment
          type: categorical
          description: buckets customers by how many orders they have placed.
          expr: |
            case
              when coalesce(number_of_orders, 0) >= 10 then 'power'
              when coalesce(number_of_orders, 0) >= 5 then 'frequent'
              when coalesce(number_of_orders, 0) >= 2 then 'repeat'
              when coalesce(number_of_orders, 0) = 1 then 'one_time'
              else 'no_orders'
            end
        - name: customer_recency_bucket
          type: categorical
          description: buckets customers by recency relative to their most recent order date.
          expr: |
            case
              when most_recent_order_date is null then 'no_orders'
              when datediff('day', most_recent_order_date, current_date) <= 30 then 'active_30d'
              when datediff('day', most_recent_order_date, current_date) <= 90 then 'active_90d'
              when datediff('day', most_recent_order_date, current_date) <= 180 then 'active_180d'
              else 'inactive'
            end

    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer
          type: primary
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total amount the customer has spent across all orders in dollars.
        dimension:
          type: categorical
