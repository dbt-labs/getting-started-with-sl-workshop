models:
  - name: dim_customers
    description: |
      Customer dimension with one row per customer.

      This model combines customer attributes from `stg_customers` with order history from
      `fct_orders` to provide customer lifecycle fields and simple customer-level aggregates.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - unique
          - not_null

      - name: first_name
        description: Customer first name from the source customer record.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name from the source customer record.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first recorded order.
        dimension:
          type: time
        granularity: day

      - name: most_recent_order_date
        description: Date of the customer's most recent recorded order.
        dimension:
          type: time
        granularity: day

      - name: number_of_orders
        description: Total number of orders placed by the customer.

      - name: lifetime_value
        description: Total order revenue generated by the customer across all orders.

    metrics:
      - name: customer_count
        description: Count of customers in the customer dimension.
        type: simple
        label: Customer Count
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: Total lifetime value across customers.
        type: simple
        label: Customer Lifetime Value
        agg: sum
        expr: lifetime_value

      - name: customer_order_count
        description: Total number of orders across customers.
        type: simple
        label: Customer Order Count
        agg: sum
        expr: number_of_orders

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        type: simple
        label: Average Customer Lifetime Value
        agg: average
        expr: lifetime_value
