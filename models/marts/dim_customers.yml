version: 2

models:
  - name: dim_customers
    description: one row per customer with basic profile details and purchase history summary.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        label: Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: repeat_customer_count
        label: Repeat Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 1

      - name: high_value_customer_count
        label: High Value Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

      - name: total_customer_lifetime_value
        label: Total Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: avg_customer_lifetime_value
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        label: Total Customer Orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: avg_orders_per_customer
        label: Average Orders per Customer
        type: simple
        agg: average
        expr: number_of_orders

metrics:
  - name: repeat_customer_rate
    label: Repeat Customer Rate
    type: ratio
    numerator: repeat_customer_count
    denominator: customer_count

  - name: orders_per_customer
    label: Orders per Customer
    type: ratio
    numerator: total_customer_orders
    denominator: customer_count

