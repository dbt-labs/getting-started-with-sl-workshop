models:
  - name: dim_customers
    description: |
      Customer dimension at one row per customer, enriched with first order date,
      most recent order date, lifetime order count, and lifetime value.
    semantic_model:
      enabled: true
      name: dim_customers
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Unique identifier for a customer.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: customer_id

      - name: first_name
        description: Customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.

      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.

    metrics:
      - name: customer_count
        description: Count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_count_with_orders
        description: Count of customers who have placed at least one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__first_order_date') }} is not null


      - name: total_lifetime_orders
        description: Total lifetime orders across all customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_lifetime_value
        description: Total lifetime value across all customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value
