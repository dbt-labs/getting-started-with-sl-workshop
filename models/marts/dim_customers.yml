version: 2

models:
  - name: dim_customers
    description: Customer dimension with one row per customer and order lifecycle attributes derived from order history.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        entity:
          type: primary
          name: customer_id
      - name: first_name
        description: Customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: Customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.
        dimension:
          type: categorical
    metrics:
      - name: customers
        description: Count of customers in the customer dimension.
        label: Customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        description: Count of customers who have placed at least one order.
        label: Customers with orders
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__number_of_orders') }} > 0

      - name: repeat_customers
        description: Count of customers who have placed more than one order.
        label: Repeat customers
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__number_of_orders') }} > 1

      - name: customer_lifetime_value
        description: Total lifetime value across all customers.
        label: Customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value

      - name: repeat_customer_rate
        description: Share of customers who have placed more than one order.
        label: Repeat customer rate
        type: ratio
        numerator: repeat_customers
        denominator: customers

      - name: high_value_customers
        description: Count of customers whose lifetime value is greater than 50.
        label: High value customers
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__lifetime_value') }} > 50


