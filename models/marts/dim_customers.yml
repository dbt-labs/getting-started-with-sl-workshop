version: 2

models:
  - name: dim_customers
    description: one row per customer with profile details, order activity, and lifetime value.
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date

    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer_id
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Count of customers.
        label: Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: Total lifetime value across customers.
        label: Total Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: customers_with_lifetime_value_over_100
        description: Count of customers with lifetime value over 100
        type: simple
        label: Customers with Lifetime Value Over 100 Base
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__lifetime_value') }} > 100

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_number_of_orders
        description: Total number of orders across all customers.
        label: Total Number of Orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_customer_orders
        description: Total number of orders across customers.
        type: simple
        label: Total Customer Orders
        agg: sum
        expr: number_of_orders
