version: 2

models:
  - name: dim_customers
    description: One row per customer with customer attributes and lifetime order rollups.
    semantic_model:
      enabled: true
      name: customers

    agg_time_dimension: most_recent_order_date

    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          name: customer
          type: primary

      - name: first_name
        description: Customer first name.
        dimension:
          name: customer_first_name
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          name: customer_last_name
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Lifetime number of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: Lifetime value of the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers
        label: Customers
        description: Distinct count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        label: Customers with orders
        description: Distinct count of customers who have placed at least one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0

      - name: count_lifetime_orders
        label: Lifetime orders
        description: Total count of lifetime orders across all customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: lifetime_spend
        label: Lifetime spend
        description: Total customer lifetime spend across all customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        label: Average customer lifetime value
        description: Average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: customers_with_lifetime_value_over_100
        label: Customers with lifetime value over 100
        description: Number of customers whose lifetime value is greater than 100.
        type: derived
        expr: high_value_customers
        input_metrics:
          - name: customers
            alias: high_value_customers
            filter: |
              {{ Dimension('customer__lifetime_value') }} > 100

