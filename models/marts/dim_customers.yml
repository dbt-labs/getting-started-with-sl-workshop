models:
  - name: dim_customers
    semantic_model:
      enabled: true
      name: customers

    agg_time_dimension: first_order_date

    columns:
      - name: customer_id
        entity:
          name: customer
          type: primary

      - name: first_order_date
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        granularity: day
        dimension:
          type: time

      - name: first_name
        dimension:
          type: categorical

      - name: last_name
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        label: Customer count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        label: Customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        label: Average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value

      - name: customer_orders
        label: Customer orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: average_customer_orders
        label: Average customer orders
        type: simple
        agg: average
        expr: number_of_orders
