version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    description: customers with core profile details and order history metrics.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer
          type: primary
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers
        label: Customers
        description: count of customer records.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: repeat_customers
        label: Repeat Customers
        description: count of customers with more than one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 1

      - name: customers_lifetime_value_over_100
        label: Customers with Lifetime Value Over 100
        description: count of customers whose lifetime value exceeds 100.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

      - name: total_customer_lifetime_value
        label: Total Customer Lifetime Value
        description: sum of lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        label: Average Customer Lifetime Value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        label: Total Customer Orders
        description: total orders attributed to customers.
        type: simple
        agg: sum
        expr: number_of_orders

