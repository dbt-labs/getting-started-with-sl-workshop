version: 2

models:
  - name: dim_customers
    description: one row per customer with core customer attributes and summary order history.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer
          type: primary

      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: total number of orders placed by the customer.

      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical


    metrics:
      - name: customer_count
        description: count of customers in the dimension.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        description: count of customers who have placed at least one order.
        type: simple
        agg: sum
        expr: case when number_of_orders > 0 then 1 else 0 end

      - name: total_customer_orders
        description: total orders aggregated from the customer dimension.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_lifetime_value
        description: total lifetime value aggregated from the customer dimension.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: average_orders_per_customer
        description: average number of orders per customer.
        type: simple
        agg: average
        expr: number_of_orders

metrics:
  - name: customers_with_lifetime_value_over_100
    description: count of customers whose lifetime value is greater than 100.
    type: derived
    expr: filtered_customer_count
    input_metrics:
      - name: customer_count
        alias: filtered_customer_count
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

