version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    description: Customer dimension with one row per customer. Combines staged customer attributes with order history rolled up from `fct_orders`.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
        entity:
          type: primary
          name: customer_id

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: lifetime_value
        description: Total successful payment amount across all customer orders in dollars.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Distinct count of customers.
        type: simple
        label: Customer Count
        agg: count_distinct
        expr: customer_id

      - name: active_customers
        description: Distinct count of customers who have placed at least one order.
        type: simple
        label: Active Customers
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__number_of_orders') }} > 0

      - name: total_customer_orders
        description: Total orders across all customers.
        type: simple
        label: Total Customer Orders
        agg: sum
        expr: number_of_orders

      - name: customer_lifetime_value
        description: Sum of customer lifetime value across customers.
        type: simple
        label: Customer Lifetime Value
        agg: sum
        expr: lifetime_value

      - name: avg_customer_lifetime_value
        description: Average customer lifetime value.
        type: simple
        label: Average Customer Lifetime Value
        agg: average
        expr: lifetime_value

      - name: customers_over_100_ltv_base
        description: Distinct count of customers with lifetime value over 100.
        type: simple
        label: Customers Over 100 LTV Base
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__lifetime_value') }} > 100

metrics:
  - name: customers_over_100_ltv
    description: Number of customers with lifetime value over 100.
    label: Customers Over 100 LTV
    type: derived
    expr: high_value_customers
    input_metrics:
      - name: customers_over_100_ltv_base
        alias: high_value_customers

