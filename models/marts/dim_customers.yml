version: 2

models:
  - name: dim_customers
    description: "one row per customer with order activity and lifetime value."
    semantic_model:
      enabled: true
      name: customers
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: "unique identifier for a customer."
        entity:
          type: primary
          name: customer

      - name: first_name
        description: "customer's first name."
        dimension:
          type: categorical

      - name: last_name
        description: "customer's last name."
        dimension:
          type: categorical

      - name: first_order_date
        description: "date of the customer's first order."
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: "date of the customer's most recent order."
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: "total number of orders placed by the customer."
        dimension:
          type: categorical

      - name: lifetime_value
        description: "total successful revenue from the customer across all orders."
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: "count of customers."
        label: Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: "sum of customer lifetime value."
        label: Total Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: "average customer lifetime value."
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: "sum of orders across customers."
        label: Total Customer Orders
        type: simple
        agg: sum
        expr: number_of_orders
