version: 2

models:
  - name: dim_customers
    description: one row per customer with core customer details and summary order history used for customer reporting and segmentation.
    semantic_model:
      enabled: true
      name: customers
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer_id
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: customer's given name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's family name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical
    metrics:
      - name: customer_count
        description: Count of customers by first order date.
        label: Customer count
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: total_customer_lifetime_value
        description: Total lifetime value across customers.
        label: Total customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value
      - name: avg_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value
      - name: total_customer_orders
        description: Total orders aggregated from the customer grain.
        label: Total customer orders
        type: simple
        agg: sum
        expr: number_of_orders
      - name: customers_with_lifetime_value_over_100
        description: Count of customers whose lifetime value is greater than 100.
        label: Customers with lifetime value over 100
        type: derived
        expr: qualified_customers
        input_metrics:
          - name: customer_count
            alias: qualified_customers
            filter: |
              {{ Dimension('customer_id__lifetime_value') }} > 100


