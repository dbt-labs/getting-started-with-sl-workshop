version: 2

models:
  - name: dim_customers
    description: Dimension table at the customer grain with one row per customer, including name attributes, order history, and lifetime value.
    semantic_model:
      enabled: true
      name: customers

    agg_time_dimension: first_order_date

    metrics:
      - name: customer_count
        description: Count of customers.
        type: simple
        label: Customer Count
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: Sum of customer lifetime value across customers.
        type: simple
        label: Total Customer Lifetime Value
        agg: sum
        expr: lifetime_value

      - name: total_customer_orders
        description: Total number of orders across customers.
        type: simple
        label: Total Customer Orders
        agg: sum
        expr: number_of_orders

      - name: customers_with_lifetime_value_over_100
        description: Number of customers with lifetime value greater than 100.
        type: derived
        label: Customers with Lifetime Value Over 100
        expr: high_value_customers
        input_metrics:
          - name: customer_count
            alias: high_value_customers
            filter: |
              {{ Dimension('customer__lifetime_value') }} > 100

    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: Total number of orders placed by the customer. Defaults to 0 for customers with no orders.
        dimension:
          type: categorical
        data_tests:
          - not_null

      - name: lifetime_value
        description: Total revenue from all orders placed by the customer.
        dimension:
          type: categorical


