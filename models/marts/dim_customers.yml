version: 2

models:
  - name: dim_customers
    description: Dimension table with one row per customer and order history rollups from fct_orders.
    semantic_model:
      enabled: true
      name: customers

    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          name: customer
          type: primary
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        dimension:
          type: time
        granularity: day

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        dimension:
          type: time
        granularity: day

      - name: number_of_orders
        description: Total number of orders placed by the customer.
        dimension:
          type: categorical
        data_tests:
          - not_null

      - name: lifetime_value
        description: Total successful payment amount across all orders for the customer.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Distinct count of customers.
        label: Customer count
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: total_customer_lifetime_value
        description: Sum of customer lifetime value across all customers.
        label: Total customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: avg_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value

      - name: repeat_customers
        description: Count of customers with more than one order.
        label: Repeat customers
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 1

metrics:
  - name: repeat_customer_rate
    description: Percentage of customers who have placed more than one order.
    label: Repeat customer rate
    type: ratio
    numerator: repeat_customers
    denominator: customer_count

  - name: customers_with_lifetime_value_over_100
    description: Number of customers with a lifetime value greater than 100.
    label: Customers with lifetime value over 100
    type: derived
    expr: high_value_customer_count
    input_metrics:
      - name: customer_count
        alias: high_value_customer_count
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

