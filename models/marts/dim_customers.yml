version: 2

models:
  - name: dim_customers
    description: customer-level dimension with profile details, order activity, and lifetime value.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          name: customer
          type: primary
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        description: count of customers who have placed at least one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0

      - name: total_customer_lifetime_value
        description: total lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: average_orders_per_customer
        description: average number of orders per customer.
        type: simple
        agg: average
        expr: number_of_orders

      - name: customers_with_lifetime_value_over_100_base
        description: count of customers with lifetime value over 100.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100

metrics:
  - name: customers_with_lifetime_value_over_100
    description: count of customers with lifetime value over 100.
    type: derived
    expr: customers_with_lifetime_value_over_100_base
    input_metrics:
      - name: customers_with_lifetime_value_over_100_base

