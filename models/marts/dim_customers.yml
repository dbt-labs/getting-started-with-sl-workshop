version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    description: one row per customer with core profile details and customer order history.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total revenue attributed to the customer across all orders.
        dimension:
          type: categorical
    metrics:
      - name: total_customers
        description: count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        description: count of customers who have placed at least one order.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0

      - name: customers_with_lifetime_value_at_or_below_100
        description: count of customers with lifetime value less than or equal to 100.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} <= 100

      - name: total_customer_orders
        description: total number of orders across all customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: total_customer_lifetime_value
        description: total lifetime revenue across all customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime revenue per customer.
        type: simple
        agg: average
        expr: lifetime_value

metrics:
  - name: average_orders_per_ordering_customer
    description: average number of orders per customer who has placed at least one order.
    type: ratio
    numerator: total_customer_orders
    denominator: customers_with_orders

  - name: customers_without_orders
    description: count of customers who have not placed any orders.
    type: derived
    expr: total_customers - customers_with_orders
    input_metrics:
      - name: total_customers
      - name: customers_with_orders

  - name: cumulative_customers_with_orders
    description: running total of customers who have placed their first order over time.
    type: cumulative
    input_metric: customers_with_orders

  - name: customers_with_lifetime_value_over_100
    description: count of customers with lifetime value greater than 100.
    type: derived
    expr: total_customers - customers_with_lifetime_value_at_or_below_100
    input_metrics:
      - name: total_customers
      - name: customers_with_lifetime_value_at_or_below_100

