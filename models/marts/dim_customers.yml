version: 2

models:
  - name: dim_customers
    description: one row per customer with core customer details and order history summary.
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        data_tests:
          - unique
          - not_null
        entity:
          type: primary
          name: customer_id

      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical

      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers
        description: count of customers.
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: total lifetime value across customers.
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime value per customer.
        type: simple
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: total number of orders placed across customers.
        type: simple
        agg: sum
        expr: number_of_orders

      - name: customers_with_orders
        description: count of customers who have placed at least one order.
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('customer_id__number_of_orders') }} > 0

      - name: customers_with_lifetime_value_over_100
        description: count of customers whose lifetime value is greater than 100.
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('customer_id__lifetime_value') }} > 100

