version: 2

models:
  - name: dim_customers
    description: one row per customer with core customer profile and order history summary.
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical

    metrics:
      - name: customers
        description: total number of customers.
        label: customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: total customer lifetime revenue.
        label: customer lifetime value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: average lifetime revenue per customer.
        label: average customer lifetime value
        type: simple
        agg: average
        expr: lifetime_value

      - name: customer_orders
        description: total number of orders across customers.
        label: customer orders
        type: simple
        agg: sum
        expr: number_of_orders

      - name: average_orders_per_customer
        description: average number of orders per customer.
        label: average orders per customer
        type: simple
        agg: average
        expr: number_of_orders

      - name: high_value_customers
        description: number of customers with lifetime value over 100.
        label: high value customers
        type: derived
        expr: customers_over_100
        input_metrics:
          - name: customers
            alias: customers_over_100
            filter: |
              {{ Dimension('customer_id__lifetime_value') }} > 100

