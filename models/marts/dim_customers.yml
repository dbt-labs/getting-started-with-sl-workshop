version: 2

models:
  - name: dim_customers
    description: customer dimension with one row per customer and summary attributes about their ordering history.
    semantic_model:
      enabled: true
    agg_time_dimension: most_recent_order_date
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: customer's first name.
      - name: last_name
        description: customer's last name.
      - name: first_order_date
        description: date of the customer's first order.
        granularity: day
        dimension:
          type: time
          name: first_order_date
      - name: most_recent_order_date
        description: date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date
      - name: number_of_orders
        description: total number of orders placed by the customer.
        dimension:
          type: categorical
          name: number_of_orders

      - name: lifetime_value
        description: total revenue generated by the customer across all orders.
        dimension:
          type: categorical
          name: lifetime_value


    metrics:
      - name: customer_count
        description: count of customers.
        label: Customers
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: customer_lifetime_value
        description: total lifetime value across customers.
        label: Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: avg_customer_lifetime_value
        description: average lifetime value per customer.
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: customers_with_orders
        description: count of customers who have placed at least one order.
        label: Customers With Orders
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0

      - name: customers_with_lifetime_value_over_100
        description: count of customers with lifetime value over 100.
        label: Customers With Lifetime Value Over 100
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__lifetime_value') }} > 100
