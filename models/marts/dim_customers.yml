version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    description: one row per customer with core customer details and summary order history.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        entity:
          type: primary
          name: customer
      - name: first_name
        description: customer's first name.
        dimension:
          type: categorical
      - name: last_name
        description: customer's last name.
        dimension:
          type: categorical
      - name: first_order_date
        description: date of the customer's first completed order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: date of the customer's most recent completed order.
        granularity: day
        dimension:
          type: time
      - name: number_of_orders
        description: total number of completed orders placed by the customer.
        dimension:
          type: categorical
      - name: lifetime_value
        description: total amount the customer has spent across completed orders.
        dimension:
          type: categorical
    metrics:
      - name: customer_count
        description: Number of customers
        type: simple
        label: Customer count
        agg: count_distinct
        expr: customer_id

      - name: dim_customers_with_orders
        description: Number of customers who have placed at least one order
        type: simple
        label: Customer dimension customers with orders

        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__number_of_orders') }} > 0


      - name: total_customer_lifetime_value
        description: Sum of customer lifetime value
        type: simple
        label: Total customer lifetime value
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer
        type: simple
        label: Average customer lifetime value
        agg: average
        expr: lifetime_value

      - name: total_customer_orders
        description: Sum of orders across customers
        type: simple
        label: Total customer orders
        agg: sum
        expr: number_of_orders
