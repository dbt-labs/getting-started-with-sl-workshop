version: 2

models:
  - name: dim_customers
    description: one row per customer with core customer attributes and order history summary.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: first_name
        description: customer's first name.

      - name: last_name
        description: customer's last name.

      - name: first_order_date
        description: date of the customer's first order.

      - name: most_recent_order_date
        description: date of the customer's most recent order.

      - name: number_of_orders
        description: total number of orders placed by the customer.
        data_tests:
          - not_null
      - name: lifetime_value
        description: total revenue attributed to the customer across all orders.
        
      # Metrics
    metrics:
      - name: customers_with_orders
        label: Customers with orders
        description: Unique count of customers placing orders
        type: simple
        agg: count_distinct
        expr: customer_id

      - name: count_lifetime_orders
        description: Total count of orders per customer
        type: simple
        label: Lifetime orders
        agg: sum
        expr: number_of_orders
        
      - name: lifetime_spend
        description: Gross customer lifetime spend inclusive of taxes
        type: simple
        label: Lifetime spend
        agg: sum
        expr: lifetime_value  
