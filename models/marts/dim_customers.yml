version: 2

models:
  - name: dim_customers
    semantic_model:
      enabled: true
    agg_time_dimension: first_order_date
    description: Customer dimension with one row per customer, enriched with order history metrics derived from `fct_orders`.
    columns:
      - name: customer_id
        description: Primary key for the customer. One row in this model represents one customer.
        entity:
          type: primary
          name: customer_id

      - name: first_name
        description: Customer first name.
        dimension:
          type: categorical

      - name: last_name
        description: Customer last name.
        dimension:
          type: categorical

      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time

      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date

      - name: number_of_orders
        description: Count of orders placed by the customer.
        dimension:
          type: categorical

      - name: lifetime_value
        description: Total successful payment amount across all of the customer's orders.
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Count of customers.
        label: Customer Count
        type: simple
        agg: count
        expr: 1

      - name: customer_count_with_orders
        description: Count of customers who have placed at least one order.
        label: Customers With Orders
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('customer_id__number_of_orders') }} > 0

      - name: total_lifetime_value
        description: Total lifetime value across customers.
        label: Total Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value

      - name: average_customer_lifetime_value
        description: Average lifetime value per customer.
        label: Average Customer Lifetime Value
        type: simple
        agg: average
        expr: lifetime_value

      - name: average_orders_per_customer
        description: Average number of orders per customer.
        label: Average Orders per Customer
        type: simple
        agg: average
        expr: number_of_orders

      - name: high_value_customer_count
        description: Count of customers with lifetime value greater than 100.
        label: High Value Customer Count
        type: derived
        expr: customers
        input_metrics:
          - name: customer_count
            alias: customers
            filter: |
              {{ Dimension('customer_id__lifetime_value') }} > 100
